services:

  # ── PHP / Laravel ──────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: barangay_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - barangay_net
    depends_on:
      - mysql
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Nginx web server ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: barangay_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - barangay_net
    depends_on:
      - php

  # ── MySQL database ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: barangay_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: barangay_db
      MYSQL_USER: barangay_user
      MYSQL_PASSWORD: barangay_pass
    ports:
      - "3307:3306"
    volumes:
      - barangay_mysql_data:/var/lib/mysql
    networks:
      - barangay_net

  # ── Redis (cache + queues) ─────────────────────────────────
  redis:
    image: redis:alpine
    container_name: barangay_redis
    ports:
      - "6379:6379"
    networks:
      - barangay_net

  # ── phpMyAdmin (visual DB manager) ────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: barangay_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: barangay_user
      PMA_PASSWORD: barangay_pass
    networks:
      - barangay_net
    depends_on:
      - mysql

  # ── Vue 3 frontend dev server ──────────────────────────────
  vue:
    image: node:20-alpine
    container_name: barangay_vue
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - barangay_net
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  barangay_mysql_data:

networks:
  barangay_net:
    driver: bridge